name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: python -m pip install -e . pytest
      - name: Run tests
        run: pytest
      - name: Audit public tree
        run: |
          ! rg '/Users/|\.grok/sessions|med_[a-f0-9]{32}' \
            README.md docs site CONTRIBUTING.md SECURITY.md
